nameOverride: ""
fullnameOverride: "zama-protocol-pause"

# devnet/testnet/mainnet
network: "mainnet"
dryRun: true

serviceAccount:
  create: false
  name: zama-protocol-pause
  annotations: {}

wallet:
  awsKMS:
    enabled: true
    configmap:
      name: zama-protocol-pause
      key: AWS_KMS_KEY_ID
  # If awsKms is set to false, fall back to using the private key set in the `pauser-wallet` secret.
  secret:
    name: pauser-wallet
    key: private-key

# Zama token mint pause (Ethereum only). Skipped for any network whose
# tokenAddress is empty/absent.
ethereumToken:
  rpcUrlEnv: ETHEREUM_RPC_URL
  tokenAddress:
    devnet: ""
    testnet: "0xa798B04149e7a61cc95B7D114AD420e8969eA268"
    mainnet: "0xA12CC123ba206d4031D1c7f6223D1C2Ec249f4f3"
  tokenPauserSetWrapperAddress:
    devnet: ""
    testnet: "0xEd03Be6711787f3068885137723504a075514040"
    mainnet: "0x08940bC8944A17E64AA9F5398046ABc75bB26699"

# Gateway pause configuration.
gatewayChain:
  pauseMethodId: "0x9a5a3bc4"
  # Name of the env var (declared under `env:`) holding the Gateway RPC URL.
  rpcUrlEnv: GATEWAY_RPC_URL
  gatewayConfigContractAddress:
    devnet: "0x530749d571beBEc20980425557968cabc6328296"
    testnet: "0x94153006067B89399e059284f5a7Fe016940E332"
    mainnet: "0xDE537Be194777A56f8B19d14079E6a78249390ab"

# Host-chain protocol (ACL) pause. To onboard a new host chain, append an entry
# here; no template changes are needed. A chain is skipped for any network whose
# aclContractAddress is empty/absent.
hostChains:
  - name: ethereum
    displayName: Ethereum
    # Name of the env var (declared under `env:`) holding this chain's RPC URL.
    rpcUrlEnv: ETHEREUM_RPC_URL
    aclPauseMethodId: "0x8456cb59"
    aclContractAddress:
      devnet: "0xBCA6F8De823a399Dc431930FD5EE550Bf1C0013e"
      testnet: "0xf0Ffdc93b7E186bC2f8CB3dAA75D86d1930A433D"
      mainnet: "0xcA2E8f1F656CD25C01F05d0b243Ab1ecd4a8ffb6"
  - name: polygon
    displayName: Polygon
    rpcUrlEnv: POLYGON_RPC_URL
    aclPauseMethodId: "0x8456cb59"
    aclContractAddress:
      devnet: "0x21d5fcabee8260b8aC18A2f0cEe6869AE08cc44b"
      testnet: "0xD99Cb9Fc3c42c87f2A4A12e8Fd60318d6bDdf985"
      # TODO(polygon): fill in once the mainnet Polygon ACL contract is deployed.
      mainnet: ""

# Dynamic RPC configuration
env:
  - name: GATEWAY_RPC_URL
    valueFrom:
      secretKeyRef:
        name: rpcs
        key: gateway-rpc-url
  - name: ETHEREUM_RPC_URL
    valueFrom:
      secretKeyRef:
        name: rpcs
        key: ethereum-rpc-url
  - name: POLYGON_RPC_URL
    valueFrom:
      secretKeyRef:
        name: rpcs
        key: polygon-rpc-url

# It is highly recommended to use an authenticated RPC endpoint instead of a public one for reliability.
# Example public RPC endpoints for reference:
# Zama Gateway Devnet
# - name: GATEWAY_RPC_URL
#   value: "https://rpc-zama-devnet-0.t.conduit.xyz"
# Zama Gateway Testnet
# - name: GATEWAY_RPC_URL
#   value: "https://rpc-zama-testnet-0.t.conduit.xyz"
# Zama Gateway Mainnet
# - name: GATEWAY_RPC_URL
#   value: "https://rpc.mainnet.zama.org"
# Ethereum Sepolia
# - name: ETHEREUM_RPC_URL
#   value: "https://rpc-sepolia.flashbots.net/"
# Ethereum Mainnet
# - name: ETHEREUM_RPC_URL
#   value: "https://rpc.flashbots.net/fast"
# Polygon Amoy (Testnet)
# - name: POLYGON_RPC_URL
#   value: "https://rpc-amoy.polygon.technology/"
# Polygon Mainnet
# - name: POLYGON_RPC_URL
#   value: "https://polygon.drpc.org"

image:
  repository: ghcr.io/foundry-rs/foundry
  tag: stable
  pullPolicy: ""

imagePullSecrets:
#  - name: registry-credentials

zamaProtocolPause:
  enabled: true

zamaTokenPause:
  enabled: true

cronjob:
  enabled: true
  annotations: {}
  # Set to never execute automatically
  schedule: "0 0 31 2 *"
  concurrencyPolicy: "Forbid"
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 10
  startingDeadlineSeconds:
  suspend: true
  ttlSecondsAfterFinished:
  backoffLimit: 0
  activeDeadlineSeconds:
  restartPolicy: "Never"

  # Environment variables from ConfigMaps or Secrets
  envFrom: []
  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

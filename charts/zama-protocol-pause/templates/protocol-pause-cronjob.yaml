{{- if .Values.zamaProtocolPause.enabled }}
{{- include "zama-protocol-pause.validateNetwork" . }}
{{- /* No wallet is loaded in dry-run when a pauser address is set: it is impersonated on the fork. */}}
{{- $loadWallet := not (and .Values.dryRun .Values.dryRunPauserAddressOverride) }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "zama-protocol-pause.fullname" . }}-contracts
  namespace: {{ include "zama-protocol-pause.namespace" . }}
  labels:
    {{- include "zama-protocol-pause.labels" . | nindent 4 }}
  {{- with .Values.cronjob.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  {{- with .Values.cronjob.concurrencyPolicy }}
  concurrencyPolicy: {{ . }}
  {{- end }}
  {{- with .Values.cronjob.failedJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ . }}
  {{- end }}
  {{- with .Values.cronjob.successfulJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ . }}
  {{- end }}
  {{- with .Values.cronjob.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ . }}
  {{- end }}
  {{- with .Values.cronjob.suspend }}
  suspend: {{ . }}
  {{- end }}
  jobTemplate:
    spec:
      {{- with .Values.cronjob.ttlSecondsAfterFinished }}
      ttlSecondsAfterFinished: {{ . }}
      {{- end }}
      {{- with .Values.cronjob.backoffLimit }}
      backoffLimit: {{ . }}
      {{- end }}
      {{- with .Values.cronjob.activeDeadlineSeconds }}
      activeDeadlineSeconds: {{ . }}
      {{- end }}
      template:
        metadata:
          {{- with .Values.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          labels:
            {{- include "zama-protocol-pause.selectorLabels" . | nindent 12 }}
            {{- with .Values.podLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        spec:
          {{- if or (and .Values.wallet.awsKMS.enabled $loadWallet) .Values.serviceAccount.create }}
          serviceAccountName: {{ include "zama-protocol-pause.serviceAccountName" . }}
          {{- end }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.podSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: {{ .Values.cronjob.restartPolicy | default "Never" }}
          containers:
            - name: {{ .Chart.Name }}
              {{- with .Values.securityContext }}
              securityContext:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              image: "{{ .Values.image.repository | default .Values.image.repository }}:{{ .Values.image.tag | default .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy | default .Values.image.pullPolicy }}
              command:
                - /bin/sh
                - -c
                - |
                  {{- include "zama-protocol-pause.pauseScript" . | nindent 18 }}
                  {{- $net := .Values.network }}
                  {{- range .Values.hostChains }}
                  {{- $addr := index .aclContractAddress $net }}
                  {{- if $addr }}
                  pause_contract "{{ .displayName }} (Host) {{ $net | title }}" "{{ printf "${%s}" .rpcUrlEnv }}" "{{ $addr }}" "{{ $addr }}" {{ .aclPauseMethodId }}
                  {{- end }}
                  {{- end }}
                  {{- $gw := index .Values.gatewayChain.gatewayConfigContractAddress $net }}
                  pause_contract "Gateway {{ $net | title }}" "{{ printf "${%s}" .Values.gatewayChain.rpcUrlEnv }}" "{{ $gw }}" "{{ $gw }}" {{ .Values.gatewayChain.pauseMethodId }}
              env:
                {{- if $loadWallet }}
                {{- if .Values.wallet.awsKMS.enabled }}
                - name: AWS_KMS_KEY_ID
                  valueFrom:
                    configMapKeyRef:
                      name: {{ .Values.wallet.awsKMS.configmap.name }}
                      key: {{ .Values.wallet.awsKMS.configmap.key }}
                {{- else }}
                - name: WALLET_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.wallet.secret.name }}
                      key: {{ .Values.wallet.secret.key }}
                {{- end }}
                {{- end }}
              {{- with .Values.env }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- with .Values.cronjob.envFrom }}
              envFrom:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- if .Values.cronjob.resources }}
              resources:
                {{- toYaml .Values.cronjob.resources | nindent 16 }}
              {{- else }}
              {{- with .Values.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- end }}
              {{- with .Values.volumeMounts }}
              volumeMounts:
                {{- toYaml . | nindent 16 }}
              {{- end }}
          {{- with .Values.volumes }}
          volumes:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}

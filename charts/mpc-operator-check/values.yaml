mpcOperatorCheck:
  kmsKeys:
    enabled: true
  kmsCore:
    enabled: true
  kmsConnector:
    enabled: true

awsCli:
  enabled: true
  image:
    # Public image
    # repository: amazon/aws-cli
    # tag: 2.35.3
    # Private secure image
    repository: hub.zama.org/zama-protocol/zama.ai/aws-cli
    tag: 2.35-dev
  script: |
    echo "AWS check"
    echo "Listing all files in KMS-Core Public S3 bucket: $KMS_CORE__PUBLIC_VAULT__STORAGE__S3__BUCKET"
    aws s3 ls --recursive s3://$KMS_CORE__PUBLIC_VAULT__STORAGE__S3__BUCKET
    echo "Listing all files in KMS-Core Private S3 bucket: $KMS_CORE__PRIVATE_VAULT__STORAGE__S3__BUCKET"
    aws s3 ls --recursive s3://$KMS_CORE__PRIVATE_VAULT__STORAGE__S3__BUCKET
gatewayNode:
  enabled: true
  image:
    # Public image
    # repository: cgr.dev/chainguard/curl
    # tag: latest-dev
    # Private secure image
    repository: hub.zama.org/zama-protocol/zama.ai/curl
    tag: 8.20-dev
  url: http://gateway-node:8547
ethWallet:
  enabled: true
  image:
    # Public image
    # repository: ghcr.io/foundry-rs/foundry
    # tag: latest
    # Private secure image
    repository: hub.zama.org/zama-protocol/zama-ai/security-hub/infra/eth-foundry
    tag: v0.4.0
  script: |
    echo "Check KMS Connector wallet"
    echo "KMS-Connector Address:$(cast wallet address --aws)"
kubectl:
  enabled: true
  image:
    # Public image
    # repository: cgr.dev/chainguard/kubectl
    # tag: latest-dev
    # Private secure image
    repository: hub.zama.org/zama-protocol/zama.ai/kubectl
    tag: 1.35-dev
  script: |
    echo "Kubernetes namespace check"
    kubectl get all
    echo "=================================================="
    echo "Kubernetes container docker image versions check"
    kubectl get pods -o=jsonpath='{range .items[*]}{.metadata.name}{"\t"}{range .spec.containers[*]}{.image}{" "}{end}{"\n"}{end}'
postgres:
  enabled: true
  image:
    # Public image
    # repository: cgr.dev/chainguard/postgres
    # tag: latest-dev
    # Private secure image
    repository: hub.zama.org/zama-protocol/zama.ai/postgres
    tag: 17-dev
  script: |
    echo "RDS Postgres check"
    echo "List all databases of RDS Database: $DATABASE_ENDPOINT"
    psql $DATABASE_URL -c "\l"
    echo "List all tables of RDS Database: DATABASE_ENDPOINT"
    psql $DATABASE_URL -c "\dt"
    echo "View Table _sqlx_migrations of RDS Database: DATABASE_ENDPOINT"
    psql "$DATABASE_URL" -c "SELECT version, description, installed_on, success, execution_time FROM _sqlx_migrations ORDER BY version;"
kmsCoreClient:
  enabled: true
  image:
    repository: hub.zama.org/zama-protocol/zama-ai/kms/core-client
    tag: v0.13.20
  configmap:
    # Need to match the kms-core helm chart configmap (containing kms-server.toml and vaults.toml)
    name: kms-core-config
  script: |
    echo "KMS-Core kms-server.toml"
    cat kms-server.toml
    echo "=================================================="
    echo "KMS-Core enclave config content"
    cat enclave.json
    echo "=================================================="
    echo "KMS-Core runtime config (from /config endpoint)"
    config_json=$(wget -qO- "http://kms-core-${KMS_CORE__THRESHOLD__MY_ID}:9646/config") && printf '%b\n' "$(printf '%s' "$config_json" | sed -e 's/^"//' -e 's/"$//' -e 's/\\"/"/g')" || echo "Failed to fetch /config endpoint"
    echo ""
    echo "=================================================="
    echo "KMS-Core health check"
    #kms-health-check config --file kms-server.toml
    kms-health-check live --endpoint kms-core:50100 --config kms-server.toml
netcat:
  enabled: true
  image:
    # Private secure image
    repository: hub.zama.org/zama-protocol/zama.ai/netcat
    tag: 1-dev
  script: |
    echo "MPC Nodes Netcat Connection check"
    for i in $(seq 1 13)
    do
      echo "====================== mpc-node-$i ======================"
      nc -vz -w 1 mpc-node-$i 50001
      nc -vz -w 1 mpc-node-$i 9646
    done
# If kmsCoreClient is disabled, the job will use the kubeUtils image which has curl, jq, socat and grpc-health-probe installed
utils:
  image:
    # Public image
    # repository: cgr.dev/chainguard/curl
    # tag: latest-dev
    # Private secure image
    repository: hub.zama.org/zama-protocol/zama.ai/kubectl
    tag: 1.35-dev
  script: |
    echo "Kube Utils check"
  # tail -f /dev/null
job:
  ttlSecondsAfterFinished: 300

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets:
  - name: registry-credentials
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  create: false
  annotations: {}
  name: "mpc-party"

configmap:
  name: "mpc-party"

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

nodeSelector: {}

# By default, schedule on the terraform-mpc-modules enclave node group
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: "node.kubernetes.io/enclave-enabled"
              operator: In
              values:
                - "true"
tolerations:
  - key: "node.kubernetes.io/enclave-enabled"
    effect: NoSchedule
    operator: Equal
    value: "true"

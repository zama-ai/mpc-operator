# -- eRPC image
image:
  repository: ghcr.io/erpc/erpc
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Number of eRPC replicas
replicas: 1

# -- CLI arguments passed to the eRPC container. The image's entrypoint is
# `erpc`, which takes the config-file path as a positional argument. Without
# an explicit path eRPC searches a hardcoded set of well-known locations
# (/home/nonroot/erpc.yaml, /erpc.yaml, /root/erpc.yaml, ...) — none of which
# match the ConfigMap mount at /config/erpc.yaml below, so the rendered config
# would be silently ignored and the proxy would boot with default public
# endpoints. The default below points at the mounted ConfigMap.
args:
  - /config/erpc.yaml

# ---------------------------------------------------------------------------
# eRPC config.
#
# Merge order (last wins):
#   1. config/<baseConfig>  (bundled profile in this chart)
#   2. config               (this block — deep-merged on top)
#
# Available profiles in config/:
#   erpc-base.yaml    minimal defaults, no networks/upstreams (default)
#   erpc-public.yaml  public nodes, listener-indexer tuned
# ---------------------------------------------------------------------------
# -- Base eRPC config profile (must exist as a file in charts/erpc/config/).
baseConfig: erpc-base.yaml

# -- Partial overrides deep-merged on top of the base profile.
# Example: set logLevel to info without replacing the entire config.
config: {}
  # logLevel: info

# -- Full replacement (ignores base profile + config overrides).
# Usage: --set-file configFile=path/to/custom-erpc.yaml
configFile: ""

# -- ServiceAccount configuration
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# -- Annotations/labels applied to the eRPC pod
podAnnotations: {}
podLabels: {}

# -- Environment variables for the eRPC container
env: []
envFrom: []

# -- Resource requests/limits
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

# -- Service exposing the eRPC HTTP and Prometheus metrics ports
service:
  type: ClusterIP
  httpPort: 4000
  metricsPort: 4001
  annotations: {}

# ---------------------------------------------------------------------------
# Security context — hardened defaults for the eRPC distroless image.
# seccompProfile.type=RuntimeDefault satisfies the Pod Security Standard
# "restricted (strict)" profile and the Kyverno restrict-seccomp-strict
# policy. Override to {} to opt out.
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  seccompProfile:
    type: RuntimeDefault

# -- Prometheus metrics scraping via ServiceMonitor (requires the
# Prometheus Operator CRDs).
metrics:
  serviceMonitor:
    enabled: false
    namespace: ""
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    annotations: {}

# -- Node scheduling constraints
nodeSelector: {}
tolerations: []
affinity: {}

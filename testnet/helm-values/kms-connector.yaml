commonConfig:
  # Preset to autoconfigure the correct chain IDs and contracts addresses per network
  network: "testnet"
  databaseUrl: "postgresql://$(DATABASE_ENDPOINT)/kmsconnector"
  gatewayUrl: "$(CONDUIT_RPC_HTTP_URL)"
  ethereumUrl: "$(ETHEREUM_RPC_URL)"
  polygonUrl: "$(POLYGON_RPC_URL)"
  env:
    - name: CONDUIT_RPC_HTTP_URL
      valueFrom:
        secretKeyRef:
          name: conduit
          key: conduit-rpc-http-url
    - name: ETHEREUM_RPC_URL
      valueFrom:
        secretKeyRef:
          name: rpc
          key: ethereum-rpc-url
    - name: POLYGON_RPC_URL
      valueFrom:
        secretKeyRef:
          name: rpc
          key: polygon-rpc-url
    - name: DATABASE_ENDPOINT
      valueFrom:
        secretKeyRef:
          name: connector-database
          key: endpoint
    - name: PGUSER
      valueFrom:
        secretKeyRef:
          name: connector-database
          key: username
    - name: PGPASSWORD
      valueFrom:
        secretKeyRef:
          name: connector-database
          key: password

kmsConnectorDbMigration:
  enabled: true
  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/kms-connector/db-migration
    tag: v0.13.0
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: "node.kubernetes.io/enclave-enabled"
                operator: In
                values:
                  - "true"
  tolerations:
    - key: "node.kubernetes.io/enclave-enabled"
      effect: NoSchedule
      operator: Equal
      value: "true"

kmsConnectorGwListener:
  enabled: true
  nameOverride: kms-connector-gw-listener
  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/kms-connector/gw-listener
    tag: v0.13.0
  replicas: 1
  config:
    # Use full node
    gatewayUrl: "http://gateway-node:8547"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: "node.kubernetes.io/enclave-enabled"
                operator: In
                values:
                  - "true"
  tolerations:
    - key: "node.kubernetes.io/enclave-enabled"
      effect: NoSchedule
      operator: Equal
      value: "true"

kmsConnectorKmsWorker:
  enabled: true
  nameOverride: kms-connector-kms-worker
  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/kms-connector/kms-worker
    tag: v0.13.0
  replicas: 1
  config:
    kmsCoreEndpoints: "http://kms-core:50100"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: "node.kubernetes.io/enclave-enabled"
                operator: In
                values:
                  - "true"
  tolerations:
    - key: "node.kubernetes.io/enclave-enabled"
      effect: NoSchedule
      operator: Equal
      value: "true"

kmsConnectorTxSender:
  enabled: true
  nameOverride: kms-connector-tx-sender
  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/kms-connector/tx-sender
    tag: v0.13.0
  replicas: 1
  serviceAccountName: mpc-party-connector
  wallet:
    # Use the kms-connector tx-sender KMS key as ethereum wallet
    awsKms:
      enabled: true
      configmap:
        name: mpc-party
        key: KMS_CONNECTOR__TX_SENDER_AWS_KMS_KEY_ID
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: "node.kubernetes.io/enclave-enabled"
                operator: In
                values:
                  - "true"
  tolerations:
    - key: "node.kubernetes.io/enclave-enabled"
      effect: NoSchedule
      operator: Equal
      value: "true"

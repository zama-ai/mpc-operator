        host: mpc-node-11
        port: 50001
      - id: 12
        host: mpc-node-12
        port: 50001
      - id: 13
        host: mpc-node-13
        port: 50001
  nitroEnclave:
    enabled: true
  aws:
    region: eu-west-1
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: "node.kubernetes.io/enclave-enabled"
                operator: In
                values:
                  - "true"
    # Make sure that kms-core pods are not scheduled on the same node (for future core sharding on enclave nodes)
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - topologyKey: "kubernetes.io/hostname"
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - kms-core
  tolerations:
    - key: "node.kubernetes.io/enclave-enabled"
      effect: NoSchedule
      operator: Equal
      value: "true"
  backupVault:
    s3:
      enabled: true
      bucket: <AWS_S3_BACKUP_BUCKET_NAME>
      prefix: backup
    awskms:
      enabled: true
      rootKeyId: arn:aws:kms:eu-west-1:<AWS_ACCOUNT_ID>:key/<AWS_KMS_KEY_ID>
      rootKeySpec: asymm
  publicVault:
    s3:
      enabled: true
      # use prefix in order to override the default prefix which is PUB, and to be backwards compatible with the old prefix system
      # Replace p1 with p{id} where id is the peer id
      prefix: "PUB-p1"
  privateVault:
    s3:
      enabled: true
      # use prefix in order to override the default prefix which is PRV, and to be backwards compatible with the old prefix system
      # Replace p1 with p{id} where id is the peer id
      prefix: "PRV-p1"
    awskms:
      enabled: true

kmsCoreClient:
  enabled: true
  nameOverride: kms-client
  image:
    name: hub.zama.org/zama-protocol/zama-ai/kms/core-client
    tag: v0.13.10
  envFrom:
    configmap:
      name: mpc-party

kubeUtils:
  image:
    name: hub.zama.org/zama-protocol/zama-ai/security-hub/infra/kube-utils
    tag: v0.4.0

rustLog: info

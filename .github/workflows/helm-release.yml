name: "Helm Chart Release"

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  HELM_VERSION: v4.1.4
jobs:
  helm-release:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Check if helm releases already exist
        id: check-release
        env:
          OCI_REGISTRY: 'oci://ghcr.io/${{ github.repository }}/charts'
        run: |
          # At least one chart needs a release unless every chart already exists.
          release_needed='false'

          for chart_dir in charts/*/; do
            chart_file="${chart_dir}Chart.yaml"
            [ -f "${chart_file}" ] || continue

            CHART_NAME=$(grep '^name:' "${chart_file}" | awk '{print $2}' | tr -d '[:space:]')
            CHART_VERSION=$(grep '^version:' "${chart_file}" | awk '{print $2}' | tr -d '[:space:]')

            if [ -z "${CHART_NAME}" ] || [ -z "${CHART_VERSION}" ]; then
              echo "Error: Failed to extract chart name or version from ${chart_file}"
              echo "CHART_NAME: '${CHART_NAME}'"
              echo "CHART_VERSION: '${CHART_VERSION}'"
              exit 1
            fi

            CHART_REF="${OCI_REGISTRY}/${CHART_NAME}"

            echo "Checking if release ${CHART_REF} version ${CHART_VERSION} already exists..."

            if helm show chart "${CHART_REF}" --version "${CHART_VERSION}" > /dev/null 2>&1; then
              echo "  -> Release already exists for ${CHART_NAME} version ${CHART_VERSION}"
            else
              echo "  -> Release does not exist for ${CHART_NAME} version ${CHART_VERSION}"
              release_needed='true'
            fi
          done

          if [ "${release_needed}" = 'true' ]; then
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-releaser
        if: steps.check-release.outputs.release_exists == 'false'
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}"
          CR_SKIP_EXISTING: true
          CR_SKIP_UPLOAD: true
          CR_GENERATE_RELEASE_NOTES: true
        # Needed as skip_upload will properly work only on future version of helm/chart-releaser-action
        continue-on-error: true
        with:
          charts_dir: charts

      - name: Push Charts to GHCR
        if: always() && steps.check-release.outputs.release_exists == 'false'
        env:
          OCI_REGISTRY: 'oci://ghcr.io/${{ github.repository }}/charts'
        run: |
          for pkg in .cr-release-packages/*.tgz; do
            if [ ! -f "${pkg}" ]; then
              break
            fi

            CHART_NAME=$(helm show chart "${pkg}" | grep '^name:' | awk '{print $2}' | tr -d '[:space:]')
            CHART_VERSION=$(helm show chart "${pkg}" | grep '^version:' | awk '{print $2}' | tr -d '[:space:]')

            if helm show chart "${OCI_REGISTRY}/${CHART_NAME}" --version "${CHART_VERSION}" > /dev/null 2>&1; then
              echo "Skipping ${CHART_NAME} ${CHART_VERSION}, already exists in registry"
              continue
            fi

            echo "Pushing ${pkg}..."
            helm push "${pkg}" "${OCI_REGISTRY}"
          done
